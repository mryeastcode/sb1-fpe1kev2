name: Meal Photos Harness CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]
jobs:
  test-meal-photos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install deps
        run: |
          cd sb1-fpe1kev2 || exit 1; npm i @supabase/supabase-js dotenv >/dev/null 2>&1 || true
      - name: Run harness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
        run: |
          cd sb1-fpe1kev2 || exit 1; node scripts/test_meal_photos_harness.js
